<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1b"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5DE39C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5DE39C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#3c3936"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>
  <ellipse cx="900" cy="500" rx="500" ry="320" fill="url(#glow)"/>

  <g transform="translate(80, 90)">
    <svg width="96" height="96" viewBox="0 0 64 64" fill="none">
      <path d="M9 21 H29 a11 11 0 0 1 0 22 H9" stroke="#c2bfbb" stroke-width="4" stroke-linecap="round"/>
      <path d="M27 21 H47 a11 11 0 0 1 0 22 H27" stroke="#5DE39C" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </g>

  <text x="80" y="320" font-family="Geist, system-ui, sans-serif" font-size="72" font-weight="500" fill="#f3f1ee" letter-spacing="-2">
    nestjs-<tspan fill="#5DE39C">jetstream</tspan>
  </text>

  <text x="80" y="380" font-family="Geist, system-ui, sans-serif" font-size="28" font-weight="400" fill="#a3a09c" letter-spacing="-0.5">
    The NATS JetStream transport NestJS microservices need.
  </text>
  <text x="80" y="418" font-family="Geist, system-ui, sans-serif" font-size="28" font-weight="400" fill="#a3a09c" letter-spacing="-0.5">
    Durable, retried, traced — under the same @EventPattern decorators.
  </text>

  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="160" height="44" rx="8" fill="#2a2826" stroke="#3c3936" stroke-width="1"/>
    <text x="80" y="28" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#5DE39C" text-anchor="middle">at-least-once</text>

    <rect x="176" y="0" width="120" height="44" rx="8" fill="#2a2826" stroke="#3c3936" stroke-width="1"/>
    <text x="236" y="28" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#7DD3FC" text-anchor="middle">retries</text>

    <rect x="312" y="0" width="120" height="44" rx="8" fill="#2a2826" stroke="#3c3936" stroke-width="1"/>
    <text x="372" y="28" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#FFB347" text-anchor="middle">DLQ</text>

    <rect x="448" y="0" width="160" height="44" rx="8" fill="#2a2826" stroke="#3c3936" stroke-width="1"/>
    <text x="528" y="28" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#c2bfbb" text-anchor="middle">tracing</text>
  </g>

  <text x="1120" y="590" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#787470" text-anchor="end">
    @horizon-republic/nestjs-jetstream
  </text>
</svg>
